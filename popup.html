<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      padding: 20px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header img {
      width: 28px;
      height: 28px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #16213e;
      border-radius: 10px;
    }

    .toggle-label {
      font-size: 14px;
      font-weight: 500;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 48px;
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 26px;
      transition: background 0.3s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    input:checked + .slider {
      background: #ff4444;
    }

    input:checked + .slider::before {
      transform: translateX(22px);
    }

    .status {
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: #888;
    }

    .status.active {
      color: #ff4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="icon">
    <h1>YouTube Focus</h1>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Focus Mode</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <p class="status" id="status">Desactivado</p>

  <script src="popup.js"></script>
</body>
</html>
